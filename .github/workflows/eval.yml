name: Evaluate

on:
  push:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Generate sample PDF
        run: |
          mkdir -p data
          python << 'PYEOF'
          from fpdf import FPDF
          pdf = FPDF()
          pdf.add_page()
          pdf.set_font('Helvetica', size=11)
          lines = [
              'RAG Architecture: A Technical Overview',
              '',
              'Retrieval-Augmented Generation combines vector search with LLM generation.',
              'The system indexes documents by chunking them into 1000-character segments',
              'with 200-character overlap. Each chunk is embedded using all-MiniLM-L6-v2',
              'into a 384-dimensional vector and stored in ChromaDB.',
              '',
              'At query time, the question is condensed against conversation history,',
              'then embedded and searched against ChromaDB. Retrieved chunks are re-ranked',
              'using a cross-encoder model before being sent to LLaMA 3.1 via Groq API.',
              '',
              'The tech stack includes Python, TypeScript, LangChain for orchestration,',
              'HuggingFace for embeddings, and Streamlit for the UI. The project was',
              'developed by a team at the AI Research Lab, established in 2022.',
              '',
              'Key frameworks: LangChain, ChromaDB, HuggingFace, Sentence Transformers,',
              'Cross-Encoders, PyTorch.',
              '',
              'Databases used: ChromaDB for vector storage, PostgreSQL for metadata,',
              'MongoDB for logging, Redis for caching.',
              '',
              'The evaluation tool uses FastAPI for the backend API, React for the',
              'frontend dashboard, Streamlit for prototyping, and Python.',
          ]
          for line in lines:
              pdf.cell(0, 10, text=line, new_x='LMARGIN', new_y='NEXT')
          pdf.output('data/sample.pdf')
          print('Generated data/sample.pdf')
          PYEOF

      - name: Run RAGAS evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python evaluate.py 2>&1 | tee eval_output.txt

      - name: Parse scores and update README
        run: |
          FAITH=$(grep -oP 'Faithfulness:\s+\K[\d.]+' eval_output.txt || echo "n/a")
          RELEV=$(grep -oP 'Answer Relevancy:\s+\K[\d.]+' eval_output.txt || echo "n/a")
          PREC=$(grep -oP 'Context Precision:\s+\K[\d.]+' eval_output.txt || echo "n/a")
          python3 scripts/update_readme_scores.py "$FAITH" "$RELEV" "$PREC"

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update RAGAS scores [skip ci]"
          git push
